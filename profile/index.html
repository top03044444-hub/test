<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하요 · 프로필</title>
<link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/ha/hayodayong/hayodayong.jpg">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;500;700;800&family=Nanum+Myeongjo:wght@400;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Sacramento&family=Geist+Mono:wght@400..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
  #pmain{opacity:0;transition:opacity .4s}
  #pmain.show{opacity:1}
  body{overflow-x:hidden}

  /* ═══ 커버와 동일한 상단 헤더 ═══ */
  .phead{max-width:1240px;margin:0 auto;padding:20px 22px 6px;display:grid;grid-template-columns:1fr auto auto;align-items:start;gap:clamp(16px,3vw,54px)}
  .series-copy{display:flex;flex-direction:column;font-weight:900;letter-spacing:.16em;color:var(--ink)}
  .series-copy strong{font-size:10px}
  .series-copy span{margin-top:3px;font-size:11px;letter-spacing:.11em}
  .cover-nav{display:flex;align-items:center;gap:13px;margin-top:4px;font-size:14px;font-weight:900;letter-spacing:.06em;white-space:nowrap;color:var(--navy)}
  body.dark .cover-nav{color:var(--ink)}
  .cover-nav a{padding:0 1px;-webkit-text-stroke: 0.6px var(--lime); paint-order: stroke fill;}
  .cover-nav a:hover{color:var(--ink)}
  .cover-nav a.on{background:linear-gradient(180deg,transparent 58%,var(--lime) 58%);padding:0 3px;color:var(--ink)}
  body.dark .cover-nav a.on{color:#3f3305}
  .cover-nav i{font-style:normal;font-weight:400;color:rgba(var(--ink-rgb),.35);text-shadow:none}
  .cover-nav .actions{display:flex;align-items:center;margin-left:4px}
  .issue-logo{margin-top:-10px;color:var(--logo);font-size:clamp(30px,3vw,44px);font-weight:900;font-style:italic;letter-spacing:-.07em;line-height:1;text-shadow:0 2px 0 var(--blue-soft),1px 0 0 var(--blue-soft);transform:rotate(-2deg);text-decoration:none}
  .issue-logo .lg-sub{display:block;margin-top:-4px;margin-left:22px;color:var(--main-dark);font-family:Georgia,serif;font-size:9px;font-style:normal;letter-spacing:.28em;text-shadow:none}
  @media(max-width:800px){
    .phead{grid-template-columns:1fr auto}
    .series-copy{grid-column:1;grid-row:1}
    .issue-logo{grid-column:2;grid-row:1;justify-self:end}
    .cover-nav{grid-column:1/-1;grid-row:2;width:100%;overflow-x:auto;scrollbar-width:none;font-size:12px}
    .cover-nav::-webkit-scrollbar{display:none}
  }

  /* ═══ 종이 위 스프레드(시트 없음) ═══ */
  .spread{max-width:1240px;margin:0 auto;padding:6px 22px 40px;display:grid;grid-template-columns:repeat(12,1fr);gap:30px 26px}
  .kickline{grid-column:1/-1;display:flex;align-items:center;gap:12px;margin-top:2px}
  .kickline .cat{font-family:var(--mono);font-size:12px;letter-spacing:3px;font-weight:800;color:var(--main-dark)}
  .kickline .ln{flex:1;height:2px;background:rgba(var(--ink-rgb),.2)}
  body.dark .kickline .ln{background:rgba(255,255,255,.14)}
  .kickline .date{font-family:var(--mono);background:var(--main-dark);color:#fff;font-size:11px;font-weight:800;letter-spacing:1px;padding:4px 9px}
  body.dark .kickline .date{color:#3f3305}

  /* ── 히어로: 좌 초대형 타이틀+팩트 / 우 테이프 스냅 아바타 ── */
  .hero{grid-column:1/-1;position:relative;display:grid;grid-template-columns:1.25fr .85fr;gap:6px 46px;align-items:start;margin-top:4px}
  .hero-l{position:relative;min-width:0}
  .pname{font-family:'Noto Sans KR',Impact,sans-serif;font-weight:900;font-size:clamp(84px,10.5vw,150px);line-height:.92;letter-spacing:-.05em;color:var(--navy);text-shadow:1px 1px 0 rgba(255,255,255,.4);text-transform:uppercase;position:relative;z-index:2}
  body.dark .pname{color:var(--ink);text-shadow:none}
  .pen{font-family:"Brush Script MT","Segoe Script",cursive;font-style:italic;font-weight:900;font-size:clamp(44px,5.2vw,74px);line-height:.8;color:var(--main);text-shadow:2px 2px 0 var(--blue-soft),3px 3px 0 rgba(255,255,255,.7);transform:rotate(-7deg);margin:-26px 0 0 16%;width:max-content;max-width:100%;position:relative;z-index:3}
  .hero-brush{position:absolute;left:4%;top:clamp(58px,7.5vw,110px);width:min(64%,430px);opacity:.9;transform:rotate(-5deg);z-index:1;pointer-events:none;filter:brightness(0) saturate(100%) invert(86%) sepia(24%) saturate(890%) hue-rotate(37deg) brightness(95%) contrast(85%)}
  .ptag{margin-top:22px;font-size:14.5px;font-weight:700;line-height:1.8;color:var(--text);position:relative;z-index:2}
  .ptag::before{content:"「 "}.ptag::after{content:" 」"}
  .ptbl{margin-top:16px;padding-top:12px;border-top:2px solid rgba(var(--ink-rgb),.23);display:grid;grid-template-columns:1fr 1fr;gap:2px 30px;position:relative;z-index:2}
  body.dark .ptbl{border-top-color:rgba(255,255,255,.18)}
  .ptbl div{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:7px 2px;font-family:var(--mono);font-size:12px}
  .ptbl div::before{content:"■";color:var(--main);margin-right:7px;font-size:10px}
  .ptbl span{color:var(--text-mid);font-weight:700;letter-spacing:1px;margin-right:auto}
  .ptbl b{color:var(--navy);font-weight:800}
  body.dark .ptbl b{color:var(--ink)}
  .ptbl .dd{font-size:10px;background:var(--main);color:#2f4d10;padding:1px 7px;margin-right:6px;font-weight:800;font-family:var(--mono)}
  .pav-card{position:relative;justify-self:end;width:clamp(250px,27vw,340px);margin:14px 4px 0 0;padding:9px;background:var(--white);border:1px solid rgba(var(--ink-rgb),.28);box-shadow:8px 10px 0 rgba(var(--ink-rgb),.14);transform:rotate(3deg);transition:transform .2s}
  .pav-card:hover{transform:rotate(0deg) translateY(-4px)}
  body.dark .pav-card{border-color:rgba(255,255,255,.1);box-shadow:8px 10px 0 rgba(0,0,0,.4)}
  .navy-tape{position:absolute;z-index:3;top:-11px;left:38%;width:56%;height:16px;background:var(--navy);opacity:.9;transform:rotate(4deg)}
  body.dark .navy-tape{background:var(--main-dark)}
  .pav{aspect-ratio:1/1;overflow:hidden;background:var(--blue-soft)}
  .pav img{width:100%;height:100%;object-fit:cover;display:block}
  .hero-heart{position:absolute;right:-6px;top:-26px;width:clamp(44px,4.4vw,62px);aspect-ratio:296/275;transform:rotate(12deg);pointer-events:none;z-index:4;display:block;background:var(--navy);-webkit-mask:url("../img/sticker-heart-line.webp") center/contain no-repeat;mask:url("../img/sticker-heart-line.webp") center/contain no-repeat}

  /* ── 카드 공통(종이 위에 직접 얹힘) ── */
  .mcard{background:var(--card);border:1px solid rgba(var(--ink-rgb),.28);box-shadow:8px 10px 0 rgba(var(--ink-rgb),.12);padding:22px 26px 26px}
  body.dark .mcard{border-color:rgba(255,255,255,.1);box-shadow:8px 10px 0 rgba(0,0,0,.42)}
  .rot-a{transform:rotate(.7deg)}.rot-b{transform:rotate(-.7deg)}.rot-c{transform:rotate(-.35deg)}
  .sec[hidden]{display:none}
  .seclabel{display:flex;align-items:center;gap:12px;margin:0 0 16px}
  .seclabel b{display:inline-block;background:var(--navy);color:var(--white);font-size:12.5px;font-weight:800;letter-spacing:.04em;padding:5px 11px;transform:rotate(-1deg);white-space:nowrap}
  body.dark .seclabel b{background:var(--main-dark);color:#3f3305}
  .seclabel .en{font-family:var(--mono);font-style:normal;font-size:10px;font-weight:800;letter-spacing:2px;color:var(--text-soft)}
  .seclabel .ln{flex:1;height:2px;background:rgba(var(--ink-rgb),.16)}
  body.dark .seclabel .ln{background:rgba(255,255,255,.12)}

  .g12{grid-column:1/-1}
  .duo{grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:30px 26px;align-items:start}
  @media(max-width:800px){.spread{gap:24px 0}.hero{grid-template-columns:1fr}.pav-card{justify-self:center;margin-top:6px}.rot-a,.rot-b,.rot-c{transform:none}}

  .intro{font-size:15px;line-height:2;color:var(--text)}

  /* 좋아/싫어 — 사각 배지 */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .lk2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  @media(max-width:520px){.lk2{grid-template-columns:1fr}}
  .lk2 .t{font-family:var(--mono);font-size:11px;letter-spacing:2px;font-weight:800;color:var(--text-soft);margin-bottom:10px}
  .pill{border-radius:0;padding:6px 13px;font-size:12.5px;font-weight:800;letter-spacing:.03em;background:var(--main);color:#2f4d10;display:inline-block;box-shadow:3px 3px 0 rgba(var(--ink-rgb),.14)}
  .pill.no{background:var(--navy);color:var(--white)}
  body.dark .pill{color:#16210b}
  body.dark .pill.no{background:#3a3418;color:var(--ink)}

  /* 능력치 — 사각 라임 스트라이프 게이지 */
  .stats{display:grid;grid-template-columns:1fr;gap:14px}
  .stat .sl{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:800;color:var(--ink);margin-bottom:6px}
  .stat .sl em{font-style:normal;font-family:var(--mono);font-size:12px;color:var(--navy)}
  body.dark .stat .sl em{color:var(--main-dark)}
  .bar{height:12px;background:var(--white);border:1.5px solid var(--navy);overflow:hidden}
  body.dark .bar{border-color:var(--main-dark);background:#141105}
  .bar i{display:block;height:100%;background-color:var(--main);background-image:repeating-linear-gradient(135deg,transparent 0 8px,rgba(0,0,0,.12) 8px 16px)}

  /* 진행한 컨텐츠 — 매거진 목차 */
  .ctable{width:100%;border-collapse:collapse;border-top:2px solid var(--navy);border-bottom:2px solid var(--navy)}
  body.dark .ctable{border-color:var(--main-dark)}
  .ctable thead th{text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:2px;font-weight:800;color:var(--text-soft);padding:9px 10px;border-bottom:1.5px solid rgba(var(--ink-rgb),.25)}
  .ctable td{padding:14px 10px;border-bottom:1px dashed rgba(var(--ink-rgb),.22);font-size:14px;vertical-align:middle}
  body.dark .ctable td{border-bottom-color:rgba(255,255,255,.14)}
  .ctable tbody tr:last-child td{border-bottom:0}
  .ctable tbody tr.lnk{cursor:pointer}
  .ctable tbody tr.lnk:hover td{background:rgba(162,240,88,.14)}
  .ctable .cdate{font-family:var(--mono);color:var(--navy);font-weight:800;font-size:12px;white-space:nowrap;width:128px}
  body.dark .ctable .cdate{color:var(--main-dark)}
  .ctable .ctitle{color:var(--ink);font-weight:600}
  .ctable .cchev{text-align:right;color:var(--navy);font-size:17px;width:26px}
  body.dark .ctable .cchev{color:var(--main-dark)}
  .cpg{display:flex;justify-content:center;gap:6px;margin-top:16px;flex-wrap:wrap}
  .cpgb{width:32px;height:32px;border:1.5px solid var(--navy);background:var(--card);color:var(--text-mid);font-size:12px;font-family:var(--mono);font-weight:800;cursor:pointer}
  body.dark .cpgb{border-color:var(--main-dark)}
  .cpgb:hover{background:rgba(162,240,88,.25)}
  .cpgb.on{background:var(--main);color:#2f4d10;border-color:var(--navy)}
  body.dark .cpgb.on{color:#16210b}

  /* 이벤트 — navy 필름 카드(스스로 카드) */
  #sec-event{padding:0;background:transparent;border:0;box-shadow:none}
  #sec-event .seclabel{margin-bottom:16px}
  .evcard{background:var(--navy);color:var(--white);padding:22px 24px;position:relative;box-shadow:8px 10px 0 rgba(var(--ink-rgb),.14);transform:rotate(-.6deg)}
  body.dark .evcard{background:#2a2410;box-shadow:8px 10px 0 rgba(0,0,0,.4)}
  @media(max-width:800px){.evcard{transform:none}}
  .evcard .now{position:absolute;top:-10px;left:16px;background:var(--main);color:#1f3a08;font-size:10px;font-weight:800;letter-spacing:2px;font-family:var(--mono);padding:3px 10px}
  .evcard .evt{font-size:17px;font-weight:800}
  .evcard .evcode{display:inline-block;margin-top:10px;background:var(--white);color:var(--navy);padding:5px 12px;font-weight:800;font-size:13px;letter-spacing:1px;font-family:var(--mono)}
  body.dark .evcard .evcode{background:#141105;color:var(--ink)}
  .evcard .evnote{font-size:13px;opacity:.92;margin-top:12px;line-height:1.7;white-space:pre-wrap}

  /* 목표 — 사각 게이지 */
  .goal .gl{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;font-weight:800;color:var(--ink);margin-bottom:8px}
  .goal .gl span:last-child{font-family:var(--mono);font-size:12px;color:var(--navy)}
  body.dark .goal .gl span:last-child{color:var(--main-dark)}
  .goal .gbar{height:20px;background:var(--white);border:1.5px solid var(--navy);overflow:hidden}
  body.dark .goal .gbar{border-color:var(--main-dark);background:#141105}
  .goal .gbar i{display:block;height:100%;background-color:var(--main);background-image:repeating-linear-gradient(135deg,transparent 0 10px,rgba(0,0,0,.12) 10px 20px);text-align:right;color:#1f3a08;font-size:10px;font-family:var(--mono);font-weight:800;line-height:20px;padding-right:8px}
  .goal .gnext{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--text-soft);margin-top:9px}

  /* VOD — navy 필름 그룹(커버 FAVORITE MOMENTS 문법) */
  #sec-vod{background:var(--navy);border:0;box-shadow:8px 10px 0 rgba(var(--ink-rgb),.14);padding:18px 20px 20px}
  body.dark #sec-vod{background:#2a2410;box-shadow:8px 10px 0 rgba(0,0,0,.4)}
  #sec-vod .seclabel{margin-bottom:14px}
  #sec-vod .seclabel b{background:var(--main);color:#1f3a08;transform:rotate(0)}
  #sec-vod .seclabel .en{color:rgba(255,254,249,.75)}
  #sec-vod .seclabel .ln{background:rgba(255,255,255,.4);height:1.5px}
  .vodgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:760px){.vodgrid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.vodgrid{grid-template-columns:1fr}}
  .vodcell{background:transparent;border:0;padding:0}
  .vodcell .fr{aspect-ratio:16/9;width:100%;display:block;border:4px solid var(--white);outline:1px dashed rgba(255,254,249,.7);background:#0b1524}
  .vodph{aspect-ratio:16/9;border:4px solid var(--white);outline:1px dashed rgba(255,254,249,.7);background:#22406a;color:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer}
  .vodph .pl{font-size:34px}.vodph .pt{font-size:13px;font-weight:700}.vodph .pt2{font-size:11px;opacity:.85}
  .vodcell .cap{padding:8px 2px 0;font-size:12px;font-weight:700;text-align:center;color:var(--white)}

  /* 링크 — 보더 박스 */
  #sec-links{background:transparent;border:0;box-shadow:none;padding:0}
  .links{display:flex;gap:12px;flex-wrap:wrap}
  .links a{padding:11px 22px;border:2px solid var(--navy);text-decoration:none;font-family:var(--mono);font-size:12px;letter-spacing:2px;font-weight:800;color:var(--navy);background:rgba(255,254,249,.5)}
  .links a:hover{background:var(--main);color:#1f3a08}
  body.dark .links a{border-color:var(--main-dark);color:var(--main-dark);background:transparent}
  body.dark .links a:hover{background:var(--main);color:#16210b}
</style>
</head>
<body>
<header class="phead">
  <div class="series-copy">
    <strong>BOKU NO HAYO NO KAWAII YATSU</strong>
    <span>僕のハヨのかわいいやつ</span>
  </div>
  <nav class="cover-nav" aria-label="카테고리">

<main class="spread" id="pmain">
  <div class="kickline"><span class="cat">PROFILE · 🐰🍀</span><span class="ln"></span><span class="date dbox"></span></div>

  <!-- 히어로 -->
  <section class="hero">
    <div class="hero-l">
      <h1 class="pname" id="pname">하요</h1>
      <div class="pen" id="pen">HAYO</div>
      <img class="hero-brush" src="../img/sticker-brushes.webp" alt="" aria-hidden="true">
      <div class="ptag" id="ptag"></div>
      <div class="ptbl" id="ptbl"></div>
    </div>
    <figure class="pav-card">
      <span class="navy-tape" aria-hidden="true"></span>
      <div class="pav av"><img id="pav" src="" referrerpolicy="no-referrer" alt="하요"></div>

  <!-- 소개 -->

  <!-- 좋아/싫어 + 능력치 -->
  <div class="duo">
    <section class="sec mcard rot-a" id="sec-pref"><div class="seclabel"><b>좋아 · 싫어</b><i class="en">LIKE / DISLIKE</i><span class="ln"></span></div>

        <div><div class="t">LIKE ♡</div><div class="chips" id="likes"></div></div>
        <div><div class="t">DISLIKE ✕</div><div class="chips" id="dislikes"></div></div>
      </div>

    <section class="sec mcard rot-b" id="sec-stats"><div class="seclabel"><b>능력치</b><i class="en">STATUS</i><span class="ln"></span></div><div class="stats" id="stats"></div></section>
  </div>

  <!-- 진행한 컨텐츠 -->
  <section class="sec mcard g12 rot-c" id="sec-contents"><div class="seclabel"><b>진행한 컨텐츠</b><i class="en">CONTENTS INDEX</i><span class="ln"></span></div><div id="contents"></div><div class="cpg" id="contents-pg"></div></section>

  <!-- 이벤트 + 목표 -->
  <div class="duo">
    <section class="sec" id="sec-event"><div class="seclabel"><b>지금 진행 중</b><i class="en">NOW ON</i><span class="ln"></span></div><div id="event"></div></section>
    <section class="sec mcard rot-a" id="sec-goal"><div class="seclabel"><b>목표</b><i class="en">GOAL</i><span class="ln"></span></div><div class="goal" id="goal"></div></section>
  </div>

  <!-- 다시보기 / 클립 -->
  <section class="sec g12 rot-c" id="sec-vod"><div class="seclabel"><b>다시보기 · 클립</b><i class="en">REPLAY</i><span class="ln"></span></div>
    <div class="vodgrid" id="ovod-grid"></div>
  </section>

  <!-- 관련 링크 -->
  <section class="sec g12" id="sec-links"><div class="seclabel"><b>관련 링크</b><i class="en">LINKS</i><span class="ln"></span></div><div class="links" id="links"></div></section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
/* ── 프로필 데이터 모델 (admin과 동일 키) ──
   name name_en soop_id avatar tagline intro birthday(MM-DD) debut agency mbti age fan_name
   tmi[] likes[] dislikes[] quotes[]
   stats[{label,value}] event{title,code,note} goal{label,current,target,next} links{soop,youtube,x} */
const DEFAULTS = {
  name:'하요', name_en:'HAYO', soop_id:'hayodayong', avatar:'',
  tagline:'하잎이를 세상에서 제일 사랑하는 하요예요 🍀',
  intro:'해맑고 조금 바보같지만 누구보다 귀여운 개인세 토끼 버추얼, 하요예요. 오후 12시에 만나서 소통하고, 종겜하고, 가끔은 마크도 같이 해요 🐰🍀',
  birthday:'02-21', debut:'2026.04.11', agency:'개인세', mbti:'', age:'', fan_name:'하잎이',
  tmi:['오후 12시 칼출근 🐰','마크 좋아함 ⛏️','웃음소리 시끄러움 😂'],

  goal:{label:'',current:0,target:0,next:''},

};
const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const arr=v=>Array.isArray(v)?v.filter(x=>x!=='' && x!=null):(typeof v==='string'?v.split(/\n|,/).map(s=>s.trim()).filter(Boolean):[]);
function avatarUrl(d){ if(d.avatar) return d.avatar; const id=d.soop_id||''; if(!id) return ''; return `https://profile.img.sooplive.co.kr/LOGO/${id.slice(0,2)}/${id}/${id}.jpg`; }
function dday(mmdd){ if(!mmdd) return null; if(typeof window.fxDday==='function') return window.fxDday(mmdd);
  var p=mmdd.split('-'),m=+p[0],d=+p[1],now=new Date();now.setHours(0,0,0,0);var nx=new Date(now.getFullYear(),m-1,d);if(nx<now)nx=new Date(now.getFullYear()+1,m-1,d);return Math.round((nx-now)/86400000); }
function daysSince(s){ if(!s) return null; var t=String(s).replace(/[.]/g,'-').replace(/[^0-9-]/g,''); var dt=new Date(t); if(isNaN(dt)) return null; var now=new Date(); now.setHours(0,0,0,0); dt.setHours(0,0,0,0); return Math.floor((now-dt)/86400000); }

function render(d){
  // 신원
  document.getElementById('pav').src = avatarUrl(d) || '';
  document.getElementById('pname').textContent = d.name||'';
  document.getElementById('pen').textContent = d.name_en||'';
  const tag=document.getElementById('ptag'); tag.textContent=d.tagline||''; tag.style.display=d.tagline?'':'none';
  // 표
  const rows=[];
  if(d.birthday){ const n=dday(d.birthday); const tag=(n===0?'오늘! 🎉':(n!=null?'D-'+n:'')); const bday=String(d.birthday).replace('-','.'); rows.push(['생일', (tag?`<em class="dd">${tag}</em>`:'')+esc(bday)]); }
  if(d.debut){ const ds=daysSince(d.debut); const dplus=(ds!=null&&ds>=0?'D+'+ds:''); rows.push(['데뷔', (dplus?`<em class="dd">${dplus}</em>`:'')+esc(d.debut)]); }
  if(d.agency) rows.push(['소속', esc(d.agency)]);
  if(d.mbti) rows.push(['MBTI', esc(d.mbti)]);
  if(d.age) rows.push(['나이', esc(d.age)]);
  if(d.fan_name) rows.push(['팬닉', esc(d.fan_name)]);
  document.getElementById('ptbl').innerHTML = rows.map(r=>`<div><span>${r[0]}</span><b>${r[1]}</b></div>`).join('');

  // 소개
  sec('sec-intro', !!d.intro, ()=>{document.getElementById('intro').textContent=d.intro;});
  // 좋아/싫어
  const likes=arr(d.likes),dis=arr(d.dislikes);
  sec('sec-pref', likes.length||dis.length, ()=>{
    document.getElementById('likes').innerHTML=likes.map(t=>`<span class="pill">${esc(t)}</span>`).join('')||'<span class="pill" style="opacity:.5">-</span>';
    document.getElementById('dislikes').innerHTML=dis.map(t=>`<span class="pill no">${esc(t)}</span>`).join('')||'<span class="pill no" style="opacity:.5">-</span>';
  });
  // 능력치
  const stats=(d.stats||[]).filter(s=>s&&s.label);
  sec('sec-stats', stats.length, ()=>{document.getElementById('stats').innerHTML=stats.map(s=>{
    const v=Math.max(0,Math.min(100,+s.value||0));
    return `<div class="stat"><div class="sl">${esc(s.label)}<em>${v}</em></div><div class="bar"><i style="width:${v}%"></i></div></div>`;
  }).join('');});
  // 어록
  const cts=(d.contents||[]).filter(c=>c&&c.title); sec('sec-contents', cts.length, ()=>renderContents(cts));
  // 이벤트
  const ev=d.event||{}; sec('sec-event', !!ev.title, ()=>{document.getElementById('event').innerHTML=
    `<div class="evcard"><span class="now">NOW</span><div class="evt">${esc(ev.title)}</div>${ev.code?`<div class="evcode">${esc(ev.code)}</div>`:''}${ev.note?`<div class="evnote">${esc(ev.note)}</div>`:''}</div>`;});
  // 목표
  const g=d.goal||{}; const has=g.target&&+g.target>0; sec('sec-goal', has, ()=>{
    const pct=Math.max(0,Math.min(100,Math.round((+g.current||0)/(+g.target)*100)));
    document.getElementById('goal').innerHTML=
      `<div class="gl"><span>${esc(g.label||'목표')}</span><span>${(+g.current||0).toLocaleString()} / ${(+g.target).toLocaleString()}</span></div>
       <div class="gbar"><i style="width:${pct}%">${pct}%</i></div>${g.next?`<div class="gnext">다음 목표 — ${esc(g.next)}</div>`:''}`;
  });
  // 링크
  const L=d.links||{}; const linkDefs=[['soop','SOOP',L.soop],['youtube','YouTube',L.youtube],['x','X',L.x]];
  const links=linkDefs.filter(x=>x[2]);
  sec('sec-links', links.length, ()=>{document.getElementById('links').innerHTML=links.map(x=>`<a href="${esc(x[2])}" target="_blank" rel="noreferrer">${x[1]}</a>`).join('');});
}
function sec(id,show,fill){ const el=document.getElementById(id); if(show){el.hidden=false;fill();} else {el.hidden=true;} }
var CONTENTS=[], CPAGE=1; const CPER=5;
function ckey(c){ return (c && c.date ? String(c.date).replace(/[^0-9]/g,'') : ''); }
function renderContents(items){ CONTENTS=items.slice().sort(function(a,b){ var ka=ckey(a),kb=ckey(b); if(ka&&kb) return kb.localeCompare(ka); if(ka) return -1; if(kb) return 1; return 0; }); CPAGE=1; drawContents(); }
function drawContents(){
  const total=Math.ceil(CONTENTS.length/CPER)||1; if(CPAGE>total) CPAGE=1;
  const slice=CONTENTS.slice((CPAGE-1)*CPER, CPAGE*CPER);
  const rows=slice.map(function(c){
    const d=c.date?esc(String(c.date).replace(/-/g,'.')):'';
    const t=esc(c.title);
    const click=c.url?` class="lnk" onclick="window.open('${esc(c.url)}','_blank','noopener')"`:'';
    return `<tr${click}><td class="cdate">${d}</td><td class="ctitle">${t}</td><td class="cchev">${c.url?'›':''}</td></tr>`;
  }).join('');
  document.getElementById('contents').innerHTML =
    `<table class="ctable"><thead><tr><th>날짜</th><th>컨텐츠</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
  const pg=document.getElementById('contents-pg');
  if(total>1){ let s=''; for(let i=1;i<=total;i++) s+=`<button class="cpgb${i===CPAGE?' on':''}" onclick="goContents(${i})">${i}</button>`; pg.innerHTML=s; }
  else pg.innerHTML='';
}
function goContents(n){ CPAGE=n; drawContents(); }

async function loadOriginalSongs(){
  const grid=document.getElementById('ovod-grid'); if(!grid) return;
  let rows=[]; try{ rows=await fetchAll('original_songs',{order:'created_at',asc:false}); }catch(e){ rows=[]; }
  if(!rows.length){
    grid.innerHTML=`<div class="vodcell"><div class="vodph"><div class="pl">▶</div><div class="pt">다시보기 준비중</div><div class="pt2">곧 올라올 예정이에요</div></div></div>`;
    return;
  }
  grid.innerHTML=rows.map(r=>{
    const id=(r.vod_id||'').trim();
    const fr=id?`<iframe class="fr" src="https://vod.sooplive.co.kr/player/${encodeURIComponent(id)}/embed" allowfullscreen loading="lazy"></iframe>`
               :`<div class="vodph"><div class="pl">▶</div><div class="pt">${esc(r.title||'영상')}</div></div>`;
    return `<div class="vodcell">${fr}<div class="cap">${esc(r.title||'영상')}</div></div>`;
  }).join('');
}

async function init(){
  let d = JSON.parse(JSON.stringify(DEFAULTS));
  try{
    const rows = await fetchAll('profile');
    const row = (rows||[]).find(r=>r.id===1) || (rows||[])[0];
    if(row && row.data && typeof row.data==='object') d = Object.assign(d, row.data);
  }catch(e){ /* 키 미입력/네트워크 시 기본값 사용 */ }
  render(d);
  await loadOriginalSongs();
  document.getElementById('pmain').classList.add('show');
  if(typeof enableIframeAutoHeight==='function') enableIframeAutoHeight();
}
