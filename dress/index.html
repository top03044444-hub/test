<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우히 · 옷장</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Gowun+Batang:wght@400;700&family=Parisienne&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1f2d35; --bg:#ffffff; --paper:#ffffff; --soft:#9bb0ba; --line:#e7eff3;
  --pink:#3fbfe6; --pink-dark:#0f7aa8; --pink-soft:#e3f4fb;
  --blue:#6fcbeb; --blue-dark:#2a93c4; --blue-soft:#eef8fd;
  --serif:'Playfair Display','Gowun Batang',serif;
  --serif-ko:'Gowun Batang',serif;
  --script:'Parisienne',cursive;
  --script-ko:'Nanum Pen Script',cursive;
  --ui:'Pretendard','Noto Sans KR',sans-serif;
  --max:1040px;
}
body.dark{
  --ink:#e6f1f5; --bg:#0d141a; --paper:#13202a; --soft:#84a0ad; --line:#243640;
  --pink:#5cc8ea; --pink-dark:#9adcf4; --pink-soft:#13303d;
  --blue:#74c6e8; --blue-dark:#9ad8f0; --blue-soft:#13303d;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;background:#eceef1;}
html:has(body.dark){background:#0a0e13;}
.sheet{background:var(--bg);max-width:1200px;margin:34px auto 0;box-shadow:0 26px 80px rgba(20,30,50,.26);overflow:hidden;transition:background .25s;}
@media(max-width:1260px){.sheet{margin:16px 14px 0;}}
body{font-family:var(--ui);background:transparent;color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .25s,color .25s;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px;}

#fx{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
#fx .fxfb{position:absolute;bottom:-40px;color:var(--pink);opacity:0;animation:rise linear infinite;}
@keyframes rise{0%{transform:translateY(0) rotate(0);opacity:0}10%{opacity:.4}90%{opacity:.4}100%{transform:translateY(-106vh) rotate(40deg);opacity:0}}
@media (prefers-reduced-motion: reduce){#fx{display:none}}

main{position:relative;z-index:1;}

/* 유틸바 */
.topbar{}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;padding-top:18px;padding-bottom:14px;gap:16px;}
.social{display:flex;gap:8px;flex:1;}
.social a{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--ink);transition:.16s;}
.social a:hover{background:var(--pink-soft);color:var(--pink-dark);}
.brand{text-align:center;line-height:1;flex-shrink:0;}
.brand .logo{font-family:var(--serif);font-weight:700;font-size:34px;letter-spacing:.5px;}
.brand .logo em{font-family:var(--script);font-style:normal;color:var(--pink);font-size:36px;margin-left:1px;}
.brand .tagline{font-size:11px;color:var(--soft);margin-top:7px;}
.topbar .right{display:flex;align-items:center;gap:12px;flex:1;justify-content:flex-end;}
.btn-join{border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-size:12.5px;font-weight:700;color:var(--ink);transition:.16s;}
.btn-join:hover{background:var(--pink);color:#fff;border-color:var(--pink);}
.theme-switch{width:24px;height:34px;border-radius:999px;border:1.5px solid var(--line);background:var(--pink-soft);position:relative;flex-shrink:0;padding:0;}
.theme-switch .knob{position:absolute;left:2px;top:2px;width:17px;height:17px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;box-shadow:0 1px 4px rgba(0,0,0,.18);transition:top .22s;}
body.dark .theme-switch .knob{top:13px;background:var(--paper);}

/* 내비 */
.nav{}
.nav .wrap{display:flex;align-items:center;justify-content:center;gap:30px;flex-wrap:wrap;padding-top:14px;padding-bottom:14px;}
.nav a{font-family:var(--serif-ko);font-size:16px;font-weight:700;color:var(--ink);transition:.16s;}
.nav a:hover{color:var(--pink-dark);}
.nav a.active{color:var(--pink-dark);}
.nav a.script{font-family:var(--script-ko);font-size:23px;color:var(--pink);font-weight:400;}

/* 섹션 헤더 */
.sections{padding-top:34px;padding-bottom:54px;}
.sec-head{display:flex;align-items:baseline;gap:13px;border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:22px;}
.sec-head .en{font-family:var(--serif);font-weight:700;font-size:23px;}
.sec-head .ko{font-family:var(--script-ko);font-size:24px;color:var(--pink);line-height:1;}
.sec-head .more{margin-left:auto;font-size:11px;color:var(--soft);letter-spacing:1.5px;align-self:center;}

/* 옷장 */
.closet-bar{display:flex;gap:10px;margin-bottom:18px;}
.closet-bar button{border:1px solid var(--line);border-radius:999px;padding:9px 18px;font-weight:700;font-size:13.5px;color:var(--ink);transition:.16s;}
.closet-bar button.on{background:var(--pink);color:#fff;border-color:var(--pink);box-shadow:0 5px 14px color-mix(in srgb,var(--pink) 32%,transparent);}
.cats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;border-bottom:1px solid var(--line);padding-bottom:13px;}
.cats button{font-family:var(--serif-ko);font-weight:700;font-size:15px;color:var(--soft);padding:2px 1px;transition:.16s;}
.cats button.on{color:var(--pink-dark);border-bottom:2px solid var(--pink);}
.poster-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.poster{cursor:pointer;}
.poster .img{position:relative;aspect-ratio:3/4;border-radius:11px;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;font-size:52px;padding-top:34px;background:linear-gradient(150deg,var(--g1,#cdeaf9),var(--g2,#7cc6e8));box-shadow:0 12px 30px rgba(40,60,80,.14);transition:transform .18s;}
.poster .img .pimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
.poster .img .badge,.poster .img .plogo,.poster .img .pmeta{z-index:1;}
.poster:hover .img{transform:translateY(-4px);}
.poster .plogo{position:absolute;top:9px;right:12px;font-family:var(--serif);font-weight:700;font-size:13px;color:rgba(255,255,255,.92);}
.poster .plogo em{font-family:var(--script);font-style:normal;}
.poster .badge{position:absolute;top:10px;left:10px;background:var(--pink);color:#fff;font-size:10px;font-weight:800;padding:4px 9px;border-radius:6px;letter-spacing:1px;}
.poster .pmeta{position:absolute;left:0;right:0;bottom:0;padding:26px 13px 14px;background:linear-gradient(transparent,rgba(15,40,55,.72));color:#fff;text-align:left;}
.poster .pcat{font-size:10px;font-weight:800;letter-spacing:1px;background:rgba(255,255,255,.24);padding:2px 8px;border-radius:5px;}
.poster .ptitle{font-family:var(--serif-ko);font-weight:700;font-size:16.5px;margin-top:7px;line-height:1.25;}
.poster .pdate{font-size:11px;opacity:.85;margin-top:3px;}
.poster-grid.new-mode{grid-template-columns:repeat(2,1fr);gap:26px;}
.poster-grid.new-mode .poster .img{aspect-ratio:3/4;border-radius:16px;padding-top:0;box-shadow:0 22px 48px rgba(30,60,90,.26);border:1px solid rgba(255,255,255,.18);}
.poster-grid.new-mode .poster:hover .img{transform:translateY(-7px);box-shadow:0 30px 60px rgba(30,60,90,.34);}
.poster-grid.new-mode .poster .plogo{top:14px;left:14px;right:auto;font-size:14px;background:rgba(15,40,55,.42);padding:5px 11px;border-radius:8px;backdrop-filter:blur(4px);}
.poster-grid.new-mode .poster .badge{top:14px;left:auto;right:14px;background:var(--pink);color:#fff;font-size:11px;font-weight:800;padding:6px 13px;border-radius:999px;letter-spacing:.5px;box-shadow:0 4px 12px color-mix(in srgb,var(--pink) 45%,transparent);}
.poster-grid.new-mode .poster .badge::before{content:"✦ ";}
.poster-grid.new-mode .poster .pmeta{padding:46px 20px 20px;background:linear-gradient(transparent,rgba(12,32,45,.85));}
.poster-grid.new-mode .poster .pcat{font-size:11px;padding:3px 11px;border-radius:6px;}
.poster-grid.new-mode .poster .ptitle{font-size:24px;margin-top:11px;}
.poster-grid.new-mode .poster .pcat-line{display:block;width:26px;height:3px;border-radius:2px;background:var(--pink);margin-bottom:9px;}
.poster-grid.new-mode .poster .pdate{font-size:12.5px;margin-top:5px;}
@media(max-width:560px){.poster-grid.new-mode{grid-template-columns:1fr}}
.empty{text-align:center;color:var(--soft);font-size:14px;padding:50px 0;font-family:var(--serif-ko);}

/* 라이트박스 */
.lb{position:fixed;inset:0;background:rgba(8,22,30,.82);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:300;padding:30px;}
.lb.on{display:flex;}
.lb .box{width:100%;max-width:330px;}
.lb .img{position:relative;aspect-ratio:3/4;border-radius:14px;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;font-size:72px;padding-top:50px;box-shadow:0 30px 70px rgba(0,0,0,.5);}
.lb .pmeta{position:absolute;left:0;right:0;bottom:0;padding:34px 18px 18px;background:linear-gradient(transparent,rgba(15,40,55,.78));color:#fff;text-align:left;}
.lb .ptitle{font-family:var(--serif-ko);font-weight:700;font-size:20px;}
.lb .pdate{font-size:12px;opacity:.85;margin-top:3px;}
.lb .close{position:absolute;top:18px;right:20px;color:#fff;font-size:28px;font-weight:300;line-height:1;}

footer{text-align:center;padding:36px 20px 46px;color:var(--soft);font-size:12px;line-height:1.85;font-family:var(--serif-ko);}

/* 문의 모달 */
.iq-ov{position:fixed;inset:0;background:rgba(20,40,50,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:400;padding:20px;}
.iq-ov.on{display:flex;}
.iq-modal{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:26px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(20,40,50,.3);}
.iq-title{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--pink-dark);}
.iq-desc{font-size:13px;color:var(--soft);margin:6px 0 16px;}
.iq-input{width:100%;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;margin-bottom:10px;}
.iq-input:focus{outline:none;border-color:var(--pink);}
textarea.iq-input{resize:vertical;}
.iq-status{font-size:12.5px;color:var(--pink-dark);min-height:16px;margin-bottom:8px;font-weight:600;}
.iq-btns{display:flex;gap:10px;}
.iq-cancel,.iq-send{flex:1;border-radius:10px;padding:12px;font-size:14px;font-weight:800;}
.iq-cancel{background:var(--line);color:var(--soft);}
.iq-send{background:var(--pink);color:#fff;}

@media(max-width:880px){.poster-grid{grid-template-columns:repeat(3,1fr)}.brand .logo{font-size:30px}.nav .wrap{gap:18px}}
@media(max-width:560px){
  .topbar .wrap{flex-wrap:wrap;justify-content:center}.social,.topbar .right{flex:none}
  .poster-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<main>

  <div class="sheet">
  <header class="topbar"><div class="wrap">
    <div class="social">
      <a href="#" title="YouTube">▶</a>

<div class="lb" id="lb" onclick="if(event.target===this)closeLb()">
  <div class="box"><div class="img" id="lb-img"><span class="close" onclick="closeLb()">×</span><div class="pmeta"><div class="ptitle" id="lb-title"></div><div class="pdate" id="lb-date"></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
/* 다크모드 */
(function(){var b=document.getElementById('themeSwitch'),k=document.getElementById('themeKnob');if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');if(k)k.textContent=document.body.classList.contains('dark')?'☀️':'🌙';if(b)b.addEventListener('click',function(){var d=document.body.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');if(k)k.textContent=d?'☀️':'🌙';});})();

/* 옷장 토글 + 분류 + 라이트박스 (데이터-드리븐 단일 렌더) */
var mode='new', cat='all';
var CATK={hair:'헤어',outfit:'의상',lens:'렌즈'};
/* 시안용 기본 데이터 (DB 연결되면 덮어씀) */
var ITEMS=[
  {nw:1,cat:'outfit',emoji:'👗',g1:'#cdeaf9',g2:'#6cc4ea',title:'청량 여름 원피스',date:'2026.01.12',img:''},
  {nw:1,cat:'hair',emoji:'💇‍♀️',g1:'#e3f4fb',g2:'#8ad0ef',title:'물결 단발 스타일',date:'2026.01.11',img:''},
  {nw:1,cat:'lens',emoji:'👁️',g1:'#d7eefb',g2:'#5bb8e0',title:'아쿠아 블루 렌즈',date:'2026.01.10',img:''},
  {nw:1,cat:'outfit',emoji:'🧥',g1:'#eaf6fc',g2:'#7ccae9',title:'겨울 데뷔 코디',date:'2025.12.13',img:''},
  {nw:0,cat:'hair',emoji:'🎀',g1:'#eef8fd',g2:'#a9def3',title:'포니테일',date:'2025.12.20',img:''},
  {nw:0,cat:'outfit',emoji:'👚',g1:'#f0f9fd',g2:'#9bd8f0',title:'데일리 니트',date:'2025.12.18',img:''},
  {nw:0,cat:'lens',emoji:'✨',g1:'#edf7fc',g2:'#88cfee',title:'기본 블루 렌즈',date:'2025.12.15',img:''}
];
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setMode(m){mode=m;document.getElementById('btn-new').classList.toggle('on',m==='new');document.getElementById('btn-old').classList.toggle('on',m==='old');render();}
function setCat(c){cat=c;document.querySelectorAll('#cats button').forEach(function(b){b.classList.toggle('on',b.dataset.c===c);});render();}
function render(){
  var grid=document.getElementById('grid');
  var isNew=(mode==='new');
  grid.classList.toggle('new-mode',isNew);
  var list=ITEMS.filter(function(it){
    return ((it.nw?1:0)===(isNew?1:0)) && (cat==='all'||it.cat===cat);
  });
  grid.innerHTML=list.map(function(it,i){
    var hasImg=!!(it.img&&it.img.trim());
    var st=hasImg?'':('background:linear-gradient(150deg,'+(it.g1||'#cdeaf9')+','+(it.g2||'#6cc4ea')+');');
    var imgTag=hasImg?'<img src="'+esc(it.img)+'" referrerpolicy="no-referrer" alt="" class="pimg">':'';
    var faceEmoji=(hasImg||isNew)?'':(it.emoji||'👗');
    var badge=it.nw?'<span class="badge">NEW</span>':'';
    var line=isNew?'<span class="pcat-line"></span>':'';
    return '<div class="poster" data-i="'+i+'"><div class="img" style="'+st+'">'+imgTag+faceEmoji+badge+'<span class="plogo">UHI<em>s</em></span><div class="pmeta">'+line+'<span class="pcat">'+(CATK[it.cat]||'의상')+'</span><div class="ptitle">'+esc(it.title)+'</div><div class="pdate">'+esc(it.date)+'</div></div></div></div>';
  }).join('');
  grid.querySelectorAll('.poster').forEach(function(p){
    p.addEventListener('click',function(){ openLb(list[+p.dataset.i]); });
  });
  document.getElementById('empty').style.display=list.length?'none':'block';
}
function openLb(it){
  if(!it)return;
  var img=document.getElementById('lb-img');
  var hasImg=!!(it.img&&it.img.trim());
  if(hasImg){ img.innerHTML='<span class="close" onclick="closeLb()">×</span><div class="pmeta"><div class="ptitle" id="lb-title"></div><div class="pdate" id="lb-date"></div></div><img src="'+esc(it.img)+'" referrerpolicy="no-referrer" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-1;">'; img.style.background='#0b1f2a'; }
  else{ img.innerHTML='<span class="close" onclick="closeLb()">×</span><div class="emoji" style="position:absolute;top:50px;left:0;right:0;text-align:center;">'+(it.emoji||'👗')+'</div><div class="pmeta"><div class="ptitle" id="lb-title"></div><div class="pdate" id="lb-date"></div></div>'; img.style.background='linear-gradient(150deg,'+(it.g1||'#cdeaf9')+','+(it.g2||'#6cc4ea')+')'; }
  document.getElementById('lb-title').textContent=it.title||'';
  document.getElementById('lb-date').textContent=it.date||'';
  document.getElementById('lb').classList.add('on');
}
function closeLb(){document.getElementById('lb').classList.remove('on');}
render();
async function loadDress(){
  if(typeof db==='undefined') return;
  try{
    var res = await db.from('dress_items').select('*').order('sort_order').order('created_at');
    var data = res.data;
    if(data && data.length){
      ITEMS = data.map(function(it){
        var nw=(it.badges||[]).some(function(b){var l=(typeof b==='string')?b:(b&&b.label);return String(l||'').trim().toUpperCase()==='NEW';});
        var dt=it.created_at?String(it.created_at).slice(2,10).replace(/-/g,'.'):'';
        return {nw:nw?1:0,cat:it.category||'outfit',emoji:'👗',g1:'#cdeaf9',g2:'#6cc4ea',title:it.name||'',date:dt,img:(it.image_url||'').trim()};
      });
      render();
    }
  }catch(e){ console.error('dress', e); }
}
function _reveal(){var mc=document.getElementById("mainContent");if(mc)mc.style.opacity="1";}
if(typeof db!=='undefined') loadDress().then(_reveal).catch(_reveal); else _reveal();
setTimeout(_reveal,1800);

/* 문의 모달 */
function openInquiry(){document.getElementById('iq-ov').classList.add('on');document.getElementById('iq-nick').focus();}
function closeInquiry(){document.getElementById('iq-ov').classList.remove('on');document.getElementById('iq-status').textContent='';}
function sendInquiry(){
  var n=document.getElementById('iq-nick').value.trim();
  var s=document.getElementById('iq-status');
  if(!n){s.textContent='닉네임을 입력해 주세요!';return;}
  s.textContent='보냈어요! (시안 미리보기라 실제 저장은 안 돼요 💙)';
  setTimeout(closeInquiry,1400);
}

/* fx 입자 (.fxfb 전용) */
(function(){
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var fx=document.getElementById('fx');
  if(fx&&!reduce){
    var g=['✦','♡','✧','✦'];
    for(var i=0;i<12;i++){
      var s=document.createElement('span');s.className='fxfb';
      s.textContent=g[i%g.length];
      s.style.left=(Math.random()*100)+'%';
      s.style.fontSize=(10+Math.random()*15)+'px';
      s.style.animationDuration=(10+Math.random()*9)+'s';
      s.style.animationDelay=(-Math.random()*15)+'s';
      fx.appendChild(s);
    }
  }
})();
</script>
