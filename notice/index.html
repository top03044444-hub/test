<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하요 · 공지</title>
<link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/ha/hayodayong/hayodayong.jpg">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;500;700;800&family=Nanum+Myeongjo:wght@400;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Sacramento&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
  .notice-count{font-size:12px;letter-spacing:1px;font-weight:700;color:var(--text-soft);margin-bottom:12px}
  .notice-list{display:flex;flex-direction:column;gap:10px}
  .notice-item{background:var(--card);border:1.5px solid var(--rule);border-radius:4px;padding:16px 20px;cursor:pointer;transition:all .2s}
  .notice-item:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
  .notice-item.pinned{border-left:4px solid var(--main);background:var(--cream)}
  .notice-header{display:flex;align-items:center;gap:10px}
  .notice-pin{font-size:11px;background:var(--main-dark);color:#fff;padding:2px 8px;border-radius:999px;font-weight:700}
  body.dark .notice-pin{color:#16210b}
  .notice-title{font-size:15px;font-weight:700;color:var(--ink);flex:1}
  .notice-thumb{width:42px;height:42px;border-radius:6px;object-fit:cover;border:1px solid var(--rule);flex-shrink:0}
  .notice-date{font-size:12px;color:var(--text-soft)}
  .notice-arrow{color:var(--main-dark);font-size:16px;transition:transform .2s}
  .notice-item.open .notice-arrow{transform:rotate(90deg)}
  .notice-content{font-size:14px;color:var(--text-mid);line-height:1.85;max-height:0;overflow:hidden;transition:max-height .3s;white-space:pre-wrap}
  .notice-item.open .notice-content{max-height:3000px;margin-top:14px;padding-top:14px;border-top:1px solid var(--rule)}
  .post-img{display:block;max-width:100%;border-radius:8px;margin-bottom:12px;border:1px solid var(--rule)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mast"><div class="logo"><span class="scr">Hayo</span><span class="sub">H A Y O · D A I L Y</span></div></div>
    <div class="navrule"><nav class="nav">
      <a href="../index.html">메인</a>
      <a href="../profile/">프로필</a>
      <a href="index.html" class="on">공지</a>
      <a href="../schedule/">일정</a>
      <a href="../dress/">옷장</a>
      <a href="../work/">업보</a>
      <a href="../song/">노래책</a>
      <div class="actions"><button class="tsw" id="tsw" type="button" aria-label="다크"><span class="kn" id="kn">🌙</span></button></div>
    </nav></div>
  </header>

  <div class="kicker"><span class="cat">NOTICE</span><span class="date dbox"></span></div>
  <h1 class="headline">공지사항</h1>
  <div class="byline">하요의 소식과 공지를 모아둔 곳이에요 🍀</div>

  <div class="card">
    <div class="notice-count" id="count"></div>
    <div class="notice-list" id="notice-list"><div class="spinner"></div></div>
  </div>

</div>

<footer class="paperfoot">© 2026 하요 Official.<br>비즈니스 문의 — hayodayong@gmail.com</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
  async function init() {
    const data = await fetchAll('notice', { order: 'created_at', asc: false });
    const pinned = data.filter(n => n.pinned);
    const normal = data.filter(n => !n.pinned);
    const all = [...pinned, ...normal];
    const el = document.getElementById('notice-list');
    document.getElementById('count').textContent = `총 ${all.length}개의 공지`;
    if (!all.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>공지사항이 없어요</div>'; return; }
    el.innerHTML = all.map(n => {
      const date = new Date(n.created_at);
      const dateStr = `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
      const imgs = (n.images&&n.images.length)?n.images:(n.image_url?[n.image_url]:[]);
      const thumb = imgs.length ? `<img src="${imgs[0]}" class="notice-thumb" referrerpolicy="no-referrer" loading="lazy" alt="">` : '';
      return `
        <div class="notice-item${n.pinned?' pinned':''}" onclick="this.classList.toggle('open')">
          <div class="notice-header">
            ${n.pinned ? '<span class="notice-pin">고정</span>' : ''}
            <span class="notice-title">${n.title}</span>
            ${thumb}
            <span class="notice-date">${dateStr}</span>
            <span class="notice-arrow">›</span>
          </div>
          <div class="notice-content">${imgs.map(u=>`<img src="${u}" class="post-img" referrerpolicy="no-referrer" loading="lazy" alt="">`).join('')}${n.content || ''}</div>
        </div>`;
    }).join('');
  }
  init();
  (function(){var M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];var t=new Date();var s=t.getFullYear()+' · '+M[t.getMonth()]+' '+t.getDate();document.querySelectorAll('.dbox').forEach(function(e){e.textContent=s});})();
</script>
<script>
(function(){if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');var sw=document.getElementById('tsw'),kn=document.getElementById('kn');function r(){if(kn)kn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';}if(sw)sw.addEventListener('click',function(){document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');r();});r();})();
</script>
<script src="../fx.js"></script>
</body>
</html>
