<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>미니게임 · 송민트</title>
<link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/ad/ad8hv5jk7d6/ad8hv5jk7d6.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --main:#8CC7AE; --main-dark:#3E8E7E; --main-light:#EAFBF6; --bg:#EAFBF6; --card:#FCFCFC;
  --logo:#3E8E7E; --accent:#3E8E7E; --apple:#5E8A4E; --apple-l:#B5DFA0;
  --text:#3D5148; --ink:#37554A; --text-soft:#7C9489; --line:#DCEDE4;
  --tape-m:rgba(158,212,191,.72); --tape-g:rgba(181,223,160,.72); --tape-b:rgba(190,225,245,.72); --tape-y:rgba(255,224,178,.8);
  --page-width:1180px; --dot:#D8F2E6;
}
body.dark{
  --main:#8CC7AE; --main-dark:#8FD6BC; --main-light:#22332C; --bg:#182320; --card:#22322C;
  --logo:#9EE0C4; --accent:#9EE0C4; --apple:#B5DFA0; --apple-l:#7FA05A;
  --text:#DFEEE7; --ink:#EAF6F0; --text-soft:#9DB5AA; --line:#33463D; --dot:#22332C;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);background-image:radial-gradient(var(--dot) 1.4px,transparent 1.4px);background-size:26px 26px;font-family:'Noto Sans KR',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;transition:background-color .25s,color .25s}
a{color:var(--accent)} a:hover{opacity:.82}
.wrap{max-width:var(--page-width);margin:0 auto;padding:16px clamp(14px,3vw,32px) 70px;opacity:0;transition:opacity .35s}
body.ready .wrap{opacity:1}
@keyframes fallDown{from{transform:translateY(-5vh) rotate(0)}to{transform:translateY(108vh) rotate(50deg)}}
@keyframes wobA{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
#fallbox{position:fixed;inset:0;pointer-events:none;z-index:6;overflow:hidden}
#fallbox span{position:absolute;top:-40px;line-height:1}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 0 2px;flex-wrap:wrap}
.topbar .spacer{flex:1}
.tbtn{font-family:'Gaegu',cursive;font-weight:700;font-size:17px;cursor:pointer;border:2px solid var(--main);background:var(--card);color:var(--main-dark);padding:6px 16px;border-radius:16px 6px 16px 6px}
.darkbtn{width:22px;height:33px;border-radius:12px;border:2px solid var(--main);background:var(--card);cursor:pointer;position:relative;padding:0}
.darkbtn i{position:absolute;left:50%;top:3px;transform:translateX(-50%);font-style:normal;font-size:11px;transition:top .2s}
body.dark .darkbtn i{top:16px}
header.logo-h{text-align:center;padding:22px 0 6px}
header.logo-h .lg{display:inline-block;background:var(--card);border-radius:999px;padding:10px 28px;box-shadow:0 4px 14px rgba(62,142,126,.14);transform:rotate(-1.5deg)}
header.logo-h .lg span{font-family:'Gaegu',cursive;font-weight:700;font-size:24px;color:var(--accent)}
nav.tape-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 8px;padding:18px 0 30px}
nav.tape-nav a{font-family:'Gaegu',cursive;font-weight:700;font-size:20px;text-decoration:none;color:var(--ink);padding:8px 24px;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.4) 0 8px,transparent 8px 16px);box-shadow:0 2px 5px rgba(62,142,126,.2);transition:transform .15s}
nav.tape-nav a:hover{transform:translateY(-2px) rotate(0)!important;opacity:1}
nav.tape-nav a:nth-child(1){transform:rotate(-2deg);background-color:var(--tape-m)}
nav.tape-nav a:nth-child(2){transform:rotate(1.5deg);background-color:var(--tape-g)}
nav.tape-nav a:nth-child(3){transform:rotate(-1deg);background-color:var(--tape-b)}
nav.tape-nav a:nth-child(4){transform:rotate(2deg);background-color:var(--tape-m)}
nav.tape-nav a:nth-child(5){transform:rotate(-1.5deg);background-color:var(--tape-g)}
nav.tape-nav a:nth-child(6){transform:rotate(1deg);background-color:var(--tape-b)}
nav.tape-nav a:nth-child(7){transform:rotate(-1deg);background-color:var(--tape-y)}
.tape{position:absolute;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.4) 0 8px,transparent 8px 16px);box-shadow:0 2px 4px rgba(0,0,0,.08);z-index:3}

.board{max-width:720px;margin:0 auto;background:var(--card);border-radius:16px 6px 18px 7px;box-shadow:0 12px 30px rgba(62,142,126,.2);padding:26px 28px 30px;position:relative;animation:wobA 6s ease-in-out infinite}
.board h1{font-family:'Jua',sans-serif;font-size:26px;color:var(--ink);text-align:center;margin-bottom:6px}
.board .sub{font-family:'Gaegu',cursive;font-size:19px;color:var(--text-soft);text-align:center;margin-bottom:18px}
.gtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:'Gaegu',cursive;font-weight:700;font-size:19px;color:var(--text-soft)}
.gtop b{color:var(--main-dark);font-size:23px}
.gbtn{font-family:'Jua',sans-serif;cursor:pointer;border:none;background:var(--main);color:#fff;padding:9px 26px;border-radius:16px 6px 16px 6px;font-size:17px;box-shadow:0 6px 14px rgba(62,142,126,.24)}
.gbtn:disabled{opacity:.6;cursor:default}
#gstage{position:relative;height:340px;background:linear-gradient(180deg,#F1FBF6,#E4F5EC);border:2.5px dashed var(--main);border-radius:14px;overflow:hidden;cursor:crosshair}
body.dark #gstage{background:linear-gradient(180deg,#1E2E28,#233A31)}
.gfall{position:absolute;font-size:32px;cursor:pointer;user-select:none;line-height:1}
.gtip{font-family:'Gaegu',cursive;font-size:18px;color:var(--text-soft);margin-top:10px;text-align:center}
.best{font-family:'Gaegu',cursive;font-weight:700;font-size:18px;color:var(--apple);text-align:center;margin-top:6px}
.pop{position:fixed;pointer-events:none;z-index:200;font-family:'Gaegu',cursive;font-weight:700;font-size:20px;color:var(--main-dark);animation:popup .8s ease-out forwards}
@keyframes popup{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(-50%,-150%) scale(1.25);opacity:0}}
footer{text-align:center;font-family:'Gaegu',cursive;font-size:17px;color:var(--text-soft);padding:44px 0 0;line-height:1.8}
</style>
</head>
<body>
<script>if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');</script>
<div id="fallbox" aria-hidden="true"></div>

<div class="wrap">
  <div class="topbar">
    <span class="spacer"></span>
    <button class="darkbtn" id="darkBtn" aria-label="다크모드"><i id="darkIcon">🌙</i></button>
  </div>

  <header class="logo-h"><span class="lg"><span>🍏 song mint's mini game 🎮</span></span></header>

  <nav class="tape-nav" aria-label="메뉴">
    <a href="../">홈</a>
    <a href="../profile/">프로필</a>
    <a href="../schedule/">일정</a>
    <a href="../song/">노래책</a>
    <a href="../notice/">공지</a>
    <a href="../work/">업보</a>
    <a href="../dress/">옷장</a>
  </nav>

  <div class="board">
    <span class="tape" style="top:-13px;left:12%;width:110px;height:30px;transform:rotate(-5deg);background-color:var(--tape-g)"></span>
    <span class="tape" style="top:-12px;right:13%;width:96px;height:27px;transform:rotate(4deg);background-color:var(--tape-b)"></span>
    <h1>애플 캐치 🍏</h1>
    <div class="sub">떨어지는 🍏 💚 💜 를 눌러서 잡아보세요!</div>
    <div class="gtop">
      <span>점수 <b id="gs">0</b></span>
      <span>시간 <b id="gt">30</b>초</span>
      <button class="gbtn" id="gbtn">시작 ▶</button>
    </div>
    <div id="gstage"></div>
    <div class="gtip">30초 안에 최대한 많이! 🍏 은 +1, 💜 은 +2</div>
    <div class="best" id="best"></div>
  </div>

  <footer>© 2026 송민트 Official.<br>비즈니스 문의 — 문의 버튼을 이용해 주세요 💚</footer>
</div>

<script>
/* 다크모드 */
(function(){
  var b=document.getElementById('darkBtn'), i=document.getElementById('darkIcon');
  function sync(){ i.textContent=document.body.classList.contains('dark')?'☀️':'🌙'; }
  sync();
  b.addEventListener('click',function(){
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light');
    sync();
  });
})();

/* 떨어지는 꾸밈 */
(function(){
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  var box=document.getElementById('fallbox');
  var kinds=[{g:'♥',c:'#9ED4BF'},{g:'◆',c:'#C3BAE8'},{g:'✦',c:'#B5DFA0'},{g:'🍏',c:''}];
  for(var i=0;i<14;i++){
    var k=kinds[i%kinds.length], s=document.createElement('span');
    s.textContent=k.g;
    s.style.left=(2+Math.random()*94).toFixed(1)+'%';
    s.style.fontSize=Math.round(13+Math.random()*13)+'px';
    s.style.opacity=(0.35+Math.random()*0.35).toFixed(2);
    if(k.c) s.style.color=k.c;
    s.style.animation='fallDown '+(9+Math.random()*9).toFixed(1)+'s linear '+(-Math.random()*18).toFixed(1)+'s infinite';
    box.appendChild(s);
  }
})();

/* 애플 캐치 */
(function(){
  var stage=document.getElementById('gstage'), scoreEl=document.getElementById('gs'),
      timeEl=document.getElementById('gt'), btn=document.getElementById('gbtn'), bestEl=document.getElementById('best');
  var running=false, score=0, time=30, spawner=null, ticker=null;
  var FACES=[{g:'🍏',p:1},{g:'💚',p:1},{g:'💜',p:2},{g:'🍏',p:1},{g:'✦',p:1}];

  function best(v){
    try{
      var b=+(localStorage.getItem('mint_game_best')||0);
      if(v>b){ localStorage.setItem('mint_game_best', v); b=v; }
      bestEl.textContent = b ? '최고 기록 ' + b + '점 🏆' : '';
    }catch(e){}
  }
  best(0);

  function spawn(){
    var f=FACES[Math.floor(Math.random()*FACES.length)];
    var s=document.createElement('div');
    s.className='gfall'; s.textContent=f.g;
    var x=Math.random()*(stage.clientWidth-36);
    s.style.left=x+'px'; s.style.top='-36px';
    var sp=1.9+Math.random()*2.4, rot=(Math.random()*2-1)*4, y=-36;
    stage.appendChild(s);
    function step(){
      if(!running){ s.remove(); return; }
      y+=sp;
      s.style.transform='translateY('+y+'px) rotate('+(y*rot*0.07)+'deg)';
      if(y>stage.clientHeight+50){ s.remove(); return; }
      s._raf=requestAnimationFrame(step);
    }
    s.addEventListener('pointerdown',function(e){
      e.preventDefault();
      if(!running) return;
      score+=f.p; scoreEl.textContent=score;
      var p=document.createElement('div');
      p.className='pop'; p.textContent='+'+f.p;
      var r=stage.getBoundingClientRect();
      p.style.left=(r.left+x+18)+'px'; p.style.top=(r.top+y+18)+'px';
      document.body.appendChild(p);
      setTimeout(function(){ p.remove(); }, 780);
      cancelAnimationFrame(s._raf); s.remove();
    });
    step();
  }

  function stop(){
    running=false;
    clearInterval(spawner); clearInterval(ticker);
    btn.disabled=false; btn.textContent=score+'점! 다시 ▶';
    Array.prototype.forEach.call(stage.querySelectorAll('.gfall'), function(el){ el.remove(); });
    best(score);
  }

  btn.addEventListener('click',function(){
    if(running) return;
    score=0; time=30; scoreEl.textContent=0; timeEl.textContent=30;
    running=true; btn.disabled=true; btn.textContent='진행 중...';
    spawner=setInterval(spawn, 560);
    ticker=setInterval(function(){
      time--; timeEl.textContent=time;
      if(time<=0) stop();
    }, 1000);
  });
})();

document.body.classList.add('ready');
</script>
<script src="../fx.js"></script>
</body>
</html>
